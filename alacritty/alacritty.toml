# ==================================================================
# Alacritty Default Configuration
# 参考: https://alacritty.org/config-alacritty.html
# ==================================================================

[general]
working_directory = "None"

[env]
TERM = "alacritty"

[window]
dimensions = { columns = 116, lines = 50 }
position = { x = 1270, y = 0 }
# decorations = "None"                       # ("Full") "None"
# opacity = 1.0 #透明度(1)
# startup_mode = "Maximized" #("Windowed") "Maximized" ,"Fullscreen"
# title = "Alacritty" # ("Alacritty")
# dynamic_title = true #(true)

[font]
size = 14

[font.normal]
family = "HackGen35 Console NF"

[colors]
# transparent_background_colors = false     #背景色に関係なく透明化("false") true
# draw_bold_text_with_bright_colors = false #太字テキストを明るく

[colors.primary]
background = "#272822"
foreground = "#F8F8F2"

[colors.normal]
black = "#272822"
red = "#F92672"
green = "#A6E22E"
yellow = "#F4BF75"
blue = "#66D9EF"
magenta = "#AE81FF"
cyan = "#A1EFE4"
white = "#F8F8F2"

[colors.bright]
black = "#75715E"
red = "#F92672"
green = "#A6E22E"
yellow = "#F4BF75"
blue = "#66D9EF"
magenta = "#AE81FF"
cyan = "#A1EFE4"
white = "#F9F8F5"

[selection]
# semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true #false

[cursor]
style = { shape = "Beam", blinking = "Off" } #{ shape = "Block", blinking = "Off" }

[terminal]
shell.program = "/Windows/System32/wsl.exe"
shell.args = ["-d", "test", "-e", "tmux", "new", "-A", "-s", "main", "-c", "~/"]

[mouse]
hide_when_typing = true #false
bindings = [
    { mouse = "Right", action = "Paste" },
    { mouse = "Middle", action = "ReceiveChar" },
]


# CSI u / Kitty Keyboard Protocol — 完全キーバインド
#
# モディファイア番号: 2=Shift  3=Alt  4=S+A  5=Ctrl  6=S+C  7=A+C  8=S+A+C
#
# シーケンス形式:
#   文字キー           : \u001b[<codepoint>;<mod>u
#   カーソル/Home/End  : \u001b[1;<mod>A/B/C/D/H/F
#   Insert〜PgDn      : \u001b[<num>;<mod>~
#   F1–F4             : \u001b[1;<mod>P/Q/R/S
#   F5–F12            : \u001b[<num>;<mod>~
#
# ⚠ TOML では \x## は無効。\uXXXX を使用すること
# ⚠ アルファベット・数字・記号は Shift 単体を除外
#   (Shift 単体バインドは大文字/記号入力を乗っ取るため)

[keyboard]
bindings = [

    # ══════════════════════════════════════════════════════
    # 特殊キー
    # ══════════════════════════════════════════════════════

    # Return (13)
    { key = "Return", mods = "Shift", chars = "\u001b[13;2u" },
    { key = "Return", mods = "Alt", chars = "\u001b[13;3u" },
    { key = "Return", mods = "Shift|Alt", chars = "\u001b[13;4u" },
    { key = "Return", mods = "Control", chars = "\u001b[13;5u" },
    { key = "Return", mods = "Shift|Control", chars = "\u001b[13;6u" },
    { key = "Return", mods = "Alt|Control", chars = "\u001b[13;7u" },
    { key = "Return", mods = "Shift|Alt|Control", chars = "\u001b[13;8u" },

    # Tab (9)
    { key = "Tab", mods = "Shift", chars = "\u001b[9;2u" },
    { key = "Tab", mods = "Alt", chars = "\u001b[9;3u" },
    { key = "Tab", mods = "Shift|Alt", chars = "\u001b[9;4u" },
    { key = "Tab", mods = "Control", chars = "\u001b[9;5u" },
    { key = "Tab", mods = "Shift|Control", chars = "\u001b[9;6u" },
    { key = "Tab", mods = "Alt|Control", chars = "\u001b[9;7u" },
    { key = "Tab", mods = "Shift|Alt|Control", chars = "\u001b[9;8u" },

    # Backspace (127)
    { key = "Back", mods = "Shift", chars = "\u001b[127;2u" },
    { key = "Back", mods = "Alt", chars = "\u001b[127;3u" },
    { key = "Back", mods = "Shift|Alt", chars = "\u001b[127;4u" },
    { key = "Back", mods = "Control", chars = "\u001b[127;5u" },
    { key = "Back", mods = "Shift|Control", chars = "\u001b[127;6u" },
    { key = "Back", mods = "Alt|Control", chars = "\u001b[127;7u" },
    { key = "Back", mods = "Shift|Alt|Control", chars = "\u001b[127;8u" },

    # Escape (27)
    { key = "Escape", mods = "Shift", chars = "\u001b[27;2u" },
    { key = "Escape", mods = "Alt", chars = "\u001b[27;3u" },
